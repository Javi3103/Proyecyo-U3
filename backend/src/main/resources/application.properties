spring.application.name=master-gateway

# Base de datos (PostgreSQL) - nunca hardcodear credenciales, siempre via variables de entorno
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/master_gateway}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Temporal mientras no exista una herramienta de migraciones (Flyway se añadirá con el modelo de datos)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# JWT - sin valor por defecto a propósito: la app no debe arrancar sin un secret real
app.jwt.secret=${JWT_SECRET}
app.jwt.temp-token-expiration-ms=${JWT_TEMP_EXPIRATION_MS:300000}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
