server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA con rutas del lado del cliente (React Router): cualquier ruta que
    # no sea un archivo real cae en index.html, si no recargar /app/algo da 404.
    location / {
        try_files $uri /index.html;
    }
}
