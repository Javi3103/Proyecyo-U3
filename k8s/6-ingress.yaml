apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: master-gateway-ingress
  namespace: master-gateway-ns
  # Sin rewrite-target: el backend espera las rutas literales (/api/auth/login,
  # /api/menus/tree, ...). Reescribirlas a "/" rompe toda la API con 404.
spec:
  ingressClassName: nginx
  rules:
    - host: mastergateway.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: master-gateway-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: master-gateway-frontend
                port:
                  number: 80
